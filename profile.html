<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Profile | Auction</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
      <div class="container">
        <a class="navbar-brand fw-bold text-white" href="index.html">Auction</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul id="navLinks" class="navbar-nav align-items-center gap-2"></ul>
        </div>
      </div>
    </nav>

    <!-- Profile -->
    <div class="container mt-5">
      <div class="bg-white p-4 rounded shadow mb-4 text-center">
        <img
          id="profileAvatar"
          src="https://placehold.co/120"
          class="rounded-circle mb-3"
          width="120"
        />

        <h2 id="profileName"></h2>
        <p>Email: <span id="profileEmail"></span></p>
        <p>Credits: <span id="profileCredits"></span></p>

        <!-- Update Avatar -->
        <div class="mt-4">
          <input
            type="url"
            id="avatarUrl"
            class="form-control mb-2"
            placeholder="Enter new avatar image URL"
          />
          <button id="updateAvatarBtn" class="btn btn-primary w-100">
            Update Avatar
          </button>
        </div>
      </div>

      <!-- Listings -->
      <div class="bg-white p-4 rounded shadow">
        <h3 class="mb-4">My Listings</h3>
        <div class="row" id="userListings"></div>
      </div>
    </div>

    <script type="module" src="js/profile.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
