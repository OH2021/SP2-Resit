<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Create Listing | Auction</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
      <div class="container">
        <a class="navbar-brand fw-bold text-white" href="index.html">Auction</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul id="navLinks" class="navbar-nav align-items-center gap-2"></ul>
        </div>
      </div>
    </nav>

    <div class="container mt-5" style="max-width: 600px">
      <div class="bg-white p-4 rounded shadow">
        <h2>Create Listing</h2>

        <form id="createListingForm">
          <input
            type="text"
            id="title"
            class="form-control mb-3"
            placeholder="Title"
            required
          />

          <textarea
            id="description"
            class="form-control mb-3"
            placeholder="Description"
            required
          ></textarea>

          <input
            type="url"
            id="media"
            class="form-control mb-3"
            placeholder="Image URL (optional)"
          />

          <input
            type="datetime-local"
            id="deadline"
            class="form-control mb-4"
            required
          />

          <button type="submit" class="btn btn-primary w-100">
            Create Listing
          </button>
        </form>
      </div>
    </div>

    <!-- THIS WAS THE PROBLEM -->
    <script type="module" src="js/create-listing.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
