<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Create Listing</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
      <div class="container">
        <a class="navbar-brand fw-bold text-white" href="index.html">Auction</a>
        <div class="collapse navbar-collapse justify-content-end">
          <div id="navLinks" class="navbar-nav align-items-center gap-2"></div>
        </div>
      </div>
    </nav>

    <div class="container mt-5" style="max-width: 600px">
      <div class="bg-white p-4 rounded shadow">
        <h2>Create Listing</h2>

        <form id="createListingForm">
          <input
            type="text"
            id="title"
            class="form-control mb-3"
            placeholder="Title"
            required
          />
          <textarea
            id="description"
            class="form-control mb-3"
            placeholder="Description"
          ></textarea>
          <input
            type="url"
            id="media"
            class="form-control mb-3"
            placeholder="Image URL"
          />
          <input
            type="datetime-local"
            id="deadline"
            class="form-control mb-4"
            required
          />

          <button class="btn btn-primary w-100">Publish Listing</button>
        </form>
      </div>
    </div>

    <script type="module">
      import { createListing } from "./js/listings.js";
      import { loadNavbar } from "./js/ui.js";

      loadNavbar(true);

      document
        .getElementById("createListingForm")
        .addEventListener("submit", (e) => {
          e.preventDefault();

          createListing(
            title.value,
            description.value,
            media.value,
            deadline.value,
          );
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
