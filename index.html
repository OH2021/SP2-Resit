<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Auction Site</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
      <div class="container">
        <a class="navbar-brand fw-bold text-white" href="index.html">
          Auction
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <div id="navLinks" class="navbar-nav align-items-center gap-2">
            <!-- JS loads links here -->
          </div>
        </div>
      </div>
    </nav>

    <!-- Page Content -->
    <div class="container mt-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="fw-bold">Listings</h1>
      </div>

      <!-- Search -->
      <input
        type="text"
        id="search"
        class="form-control mb-4"
        placeholder="Search listings..."
      />

      <!-- Listings -->
      <div id="listings" class="row g-4"></div>
    </div>

    <!-- Scripts -->
    <script type="module">
      import { loadNavbar } from "./js/ui.js";
      import { loadListings } from "./js/listings.js";

      loadNavbar(true);
      loadListings();

      const searchInput = document.getElementById("search");

      searchInput.addEventListener("input", () => {
        loadListings(searchInput.value);
      });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
