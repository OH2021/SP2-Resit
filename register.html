<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Register | Auction</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
      <div class="container">
        <a class="navbar-brand fw-bold text-white" href="index.html">Auction</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul id="navLinks" class="navbar-nav align-items-center gap-2"></ul>
        </div>
      </div>
    </nav>

    <!-- Register Form -->
    <div class="container mt-5" style="max-width: 400px">
      <div class="bg-white p-4 rounded shadow">
        <h2>Register</h2>
        <form id="registerForm">
          <input
            type="text"
            id="name"
            class="form-control mb-3"
            placeholder="Full Name"
            required
          />
          <input
            type="email"
            id="email"
            class="form-control mb-3"
            placeholder="Email"
            required
          />
          <input
            type="password"
            id="password"
            class="form-control mb-4"
            placeholder="Password"
            required
          />
          <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
      </div>
    </div>

    <!-- JS -->
    <script type="module">
      import { loadNavbar } from "./js/ui.js";
      import { register } from "./js/auth.js";

      loadNavbar();

      const form = document.getElementById("registerForm");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const nameEl = document.getElementById("name");
        const emailEl = document.getElementById("email");
        const passwordEl = document.getElementById("password");

        if (!nameEl || !emailEl || !passwordEl)
          return alert("Form inputs not found!");

        const name = nameEl.value.trim();
        const email = emailEl.value.trim();
        const password = passwordEl.value;

        if (!name || !email || !password)
          return alert("Please fill in all fields!");

        await register(name, email, password);
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
