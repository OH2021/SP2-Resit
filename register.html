<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Register - Auction</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
      <div class="container">
        <a class="navbar-brand fw-bold text-white" href="index.html">Auction</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end">
          <div id="navLinks" class="navbar-nav align-items-center gap-2"></div>
        </div>
      </div>
    </nav>

    <div
      class="container d-flex justify-content-center align-items-center"
      style="min-height: 80vh"
    >
      <form
        id="registerForm"
        class="bg-white p-5 rounded shadow w-100"
        style="max-width: 420px"
      >
        <h2 class="mb-4">Register</h2>

        <input
          type="text"
          id="name"
          class="form-control mb-3"
          placeholder="Name"
          required
        />
        <input
          type="email"
          id="email"
          class="form-control mb-3"
          placeholder="Email"
          required
        />
        <input
          type="password"
          id="password"
          class="form-control mb-4"
          placeholder="Password"
          required
        />

        <button class="btn btn-success w-100">Create Account</button>
      </form>
    </div>

    <script type="module">
      import { register } from "./js/auth.js";
      import { loadNavbar } from "./js/ui.js";

      loadNavbar(true);

      document
        .getElementById("registerForm")
        .addEventListener("submit", (e) => {
          e.preventDefault();

          const name = document.getElementById("name").value;
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          if (!email.endsWith("@stud.noroff.no")) {
            alert("Must use a stud.noroff.no email");
            return;
          }

          register(name, email, password);
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
