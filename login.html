<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login | Auction</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
      <div class="container">
        <a class="navbar-brand fw-bold text-white" href="index.html">Auction</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul id="navLinks" class="navbar-nav align-items-center gap-2">
            <li class="nav-item me-2">
              <a
                class="nav-link btn btn-outline-light text-white"
                href="index.html"
                >Home</a
              >
            </li>
            <li class="nav-item me-2">
              <a
                class="nav-link btn btn-outline-success text-white"
                href="login.html"
                >Login</a
              >
            </li>
            <li class="nav-item me-2">
              <a
                class="nav-link btn btn-outline-warning text-white"
                href="register.html"
                >Register</a
              >
            </li>
            <li class="nav-item me-2">
              <a
                class="nav-link btn btn-outline-light text-white"
                href="profile.html"
                >Profile</a
              >
            </li>
            <li class="nav-item me-2">
              <a
                class="nav-link btn btn-outline-primary text-white"
                href="create-listing.html"
                >Create Listing</a
              >
            </li>
            <li class="nav-item me-2">
              <a
                class="nav-link btn btn-outline-danger text-white"
                href="#"
                id="logoutBtn"
                >Logout</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Login Form -->
    <div class="container mt-5" style="max-width: 400px">
      <div class="bg-white p-4 rounded shadow">
        <h2>Login</h2>
        <form id="loginForm">
          <input
            type="email"
            id="email"
            class="form-control mb-3"
            placeholder="Email"
            required
          />
          <input
            type="password"
            id="password"
            class="form-control mb-4"
            placeholder="Password"
            required
          />
          <button type="submit" class="btn btn-success w-100">Login</button>
        </form>
      </div>
    </div>

    <!-- JS -->
    <script type="module">
      import { loadNavbar } from "./js/ui.js";
      import { login } from "./js/auth.js";

      loadNavbar();

      const form = document.getElementById("loginForm");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        await login(email.value.trim(), password.value);
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
